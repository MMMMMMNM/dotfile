# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'spywhere/tmux-now-playing'
set -g @plugin 'tmux-plugins/tmux-cpu'
#######################################################
set -g status-right "#[bg=#8291DD]%b-%a %H:%M:%S #[fg=black]#{cpu_icon}#{cpu_percentage}"
set -g status-style "bg=#1E1E2F"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g status-interval 1    # 状态栏刷新时间(右下角秒针会跳动)
set -g status-justify left  # 状态栏窗口列表(window list)左对齐
##8291DD
set -g visual-activity on # 启用活动警告
set -wg monitor-activity on # 非当前窗口有内容更新时在状态栏通知
set -g message-style "bg=#1E1E2F, fg=#8291DD" # 指定消息通知的前景、后景色
set-option -g status-left ""
#set -wg window-status-current-format " #I:#W#F " # 状态栏当前窗口名称格式(#I：序号，#w：窗口名 称，#F：间隔符)
set -wg window-status-current-style "fg=#d7fcaf,bg=#8291DD" # 状态栏当前窗口名称的样式
#set -wg window-status-separator "" # 状态栏窗口名称之间的间隔
set-window-option -g mode-keys vi
set-option -s set-clipboard on
set -g aggressive-resize on
#key
#reload config
bind C-r source-file ~/.config/tmux/tmux.conf \; display-message "config reload"
#set prefix key C-a
unbind C-b
set -g prefix C-a
#split-window / and -
bind '/' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
#move to window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5 
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10
#kill pane
unbind q
bind-key q confirm kill-pane
